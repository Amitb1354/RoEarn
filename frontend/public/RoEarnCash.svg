<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Outer Gold Gradient -->
    <linearGradient id="goldHexOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE875"/>
      <stop offset="40%" stop-color="#E5AA24"/>
      <stop offset="75%" stop-color="#B87B00"/>
      <stop offset="100%" stop-color="#734B00"/>
    </linearGradient>

    <!-- Inner Face Gradient -->
    <linearGradient id="goldHexFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEC8A"/>
      <stop offset="50%" stop-color="#DB9E19"/>
      <stop offset="100%" stop-color="#9E6900"/>
    </linearGradient>

    <!-- Metallic Rim Highlight -->
    <linearGradient id="hexRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#FFEC8A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4A3000" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="hexShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#hexShadow)">
    <!-- Outer Hexagon Base -->
    <path d="M 256,24 
             L 444,132.5 
             L 444,350 
             L 256,458 
             L 68,350 
             L 68,132.5 
             Z" 
          fill="url(#goldHexOuter)" 
          stroke="url(#hexRim)" 
          stroke-width="12" 
          stroke-linejoin="round"/>

    <!-- Inner Inset Hexagon Face -->
    <path d="M 256,60 
             L 412,150 
             L 412,332 
             L 256,422 
             L 100,332 
             L 100,150 
             Z" 
          fill="url(#goldHexFace)" 
          stroke="#734B00" 
          stroke-width="8" 
          stroke-opacity="0.5" 
          stroke-linejoin="round"/>

    <!-- Inner Bevel Highlight -->
    <path d="M 256,84 
             L 388,160 
             L 388,320 
             L 256,396 
             L 124,320 
             L 124,160 
             Z" 
          fill="none" 
          stroke="#FFF3A3" 
          stroke-width="6" 
          stroke-opacity="0.6" 
          stroke-linejoin="round"/>

    <!-- Center R$ Emblem -->
    <text x="250" y="278" 
          font-family="Arial Black, Impact, sans-serif" 
          font-weight="900" 
          font-size="160" 
          fill="#FFFFFF" 
          text-anchor="middle" 
          dominant-baseline="central" 
          filter="drop-shadow(0px 4px 3px rgba(0,0,0,0.4))">R$</text>
  </g>
</svg>
